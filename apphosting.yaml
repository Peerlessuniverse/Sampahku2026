kind: "AppHostingYaml"
schemaVersion: "v1"

# Pengaturan Lingkungan (Environment Variables)
env:
  - variable: VITE_APP_NAME
    value: "SampahKu 2026"
    availability: ["BUILD", "RUNTIME"]
  - variable: VITE_ENV
    value: "production"
    availability: ["BUILD", "RUNTIME"]

# Manajemen Rahasia (Secrets)
secrets:
  - variable: VITE_GEMINI_API_KEY
    secret: GEMINI_API_KEY

# Override Build dan Run Scripts
scripts:
  buildCommand: "npm run build"
  runCommand: "node server.cjs"

# Konfigurasi Output
# PENTING: Memberitahu Firebase file mana yang harus dideploy ke server
outputFiles:
  serverApp:
    include:
      - "dist"
      - "server.cjs"
      - "package.json"
      - "package-lock.json"

# Pengaturan Cloud Run
runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80
