kind: "AppHostingYaml"
schemaVersion: "v1"

# Pengaturan Lingkungan
env:
  - variable: VITE_APP_NAME
    value: "SampahKu 2026"
    availability: ["BUILD", "RUNTIME"]
  - variable: VITE_ENV
    value: "production"
    availability: ["BUILD", "RUNTIME"]

# Instruksi Build & Run mendasar
scripts:
  buildCommand: "npm run build"
  runCommand: "npm run start"

# Pengaturan Server
runConfig:
  cpu: 1
  memoryMiB: 512
