kind: "AppHostingYaml"
schemaVersion: "v1"

env:
  - variable: VITE_APP_NAME
    value: "SampahKu 2026"
    availability: ["BUILD", "RUNTIME"]
  - variable: VITE_ENV
    value: "production"
    availability: ["BUILD", "RUNTIME"]

secrets:
  - variable: VITE_GEMINI_API_KEY
    secret: GEMINI_API_KEY

secrets:
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY

scripts:
  buildCommand: "npm run build"
  runCommand: "node server.js"

runConfig:
  cpu: 1
  memoryMiB: 512
