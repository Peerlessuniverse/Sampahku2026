kind: "AppHostingYaml"
schemaVersion: "v1"

# Pengaturan Lingkungan
env:
  - variable: VITE_APP_NAME
    value: "SampahKu 2026"
    availability: ["BUILD", "RUNTIME"]
  - variable: VITE_ENV
    value: "production"
    availability: ["BUILD", "RUNTIME"]

# PINDAHKAN API KEY KE SECRETS (Harus di-set di Firebase Console)
secrets:
  - variable: VITE_GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: VITE_FIREBASE_API_KEY
    secret: FIREBASE_API_KEY

# Variabel berikut sebaiknya di-set lewat Dashboard Firebase App Hosting 
# atau dibiarkan di sini TANPA value jika repo ini publik.
# Saya hapus value-nya agar tidak kena flag scanner Google lagi.
env:
  - variable: VITE_FIREBASE_AUTH_DOMAIN
    availability: ["BUILD", "RUNTIME"]
  - variable: VITE_FIREBASE_PROJECT_ID
    availability: ["BUILD", "RUNTIME"]
  - variable: VITE_FIREBASE_STORAGE_BUCKET
    availability: ["BUILD", "RUNTIME"]
  - variable: VITE_FIREBASE_MESSAGING_SENDER_ID
    availability: ["BUILD", "RUNTIME"]
  - variable: VITE_FIREBASE_APP_ID
    availability: ["BUILD", "RUNTIME"]
  - variable: VITE_FIREBASE_MEASUREMENT_ID
    availability: ["BUILD", "RUNTIME"]

scripts:
  buildCommand: "npm run build"
  runCommand: "node server.js"

runConfig:
  cpu: 1
  memoryMiB: 512
